name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: 'latest'

      - name: Build exe and installer
        run: .\build_exe.ps1

      - name: Extract changelog for this version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          $content = [System.IO.File]::ReadAllText("CHANGELOG.md", [System.Text.Encoding]::UTF8)
          if ($content -match "(?ms)^## v$([regex]::Escape($tag))\s*\r?\n(.+?)(?=\r?\n## |\z)") {
            [System.IO.File]::WriteAllText("RELEASE_BODY.md", $Matches[1].Trim(), [System.Text.Encoding]::UTF8)
          } else {
            [System.IO.File]::WriteAllText("RELEASE_BODY.md", "", [System.Text.Encoding]::UTF8)
          }

      - name: Upload installer to Release
        uses: softprops/action-gh-release@v3
        with:
          files: Output/Remaku_Setup.exe
          body_path: RELEASE_BODY.md
          prerelease: ${{ contains(github.ref_name, '-') }}
